<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glowRust" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b3580"/>
      <stop offset="100%" stop-color="#ff6b3500"/>
    </radialGradient>
    <radialGradient id="glowPython" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3776ab80"/>
      <stop offset="100%" stop-color="#3776ab00"/>
    </radialGradient>
    <radialGradient id="glowSolana" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9945ff80"/>
      <stop offset="100%" stop-color="#9945ff00"/>
    </radialGradient>
    <radialGradient id="glowTokio" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff478580"/>
      <stop offset="100%" stop-color="#ff478500"/>
    </radialGradient>
    <radialGradient id="glowWgpu" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00bfff80"/>
      <stop offset="100%" stop-color="#00bfff00"/>
    </radialGradient>
    <radialGradient id="glowJava" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ed8b0080"/>
      <stop offset="100%" stop-color="#ed8b0000"/>
    </radialGradient>
    <radialGradient id="glowSpring" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6db33f80"/>
      <stop offset="100%" stop-color="#6db33f00"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse1 { 0%,100% { opacity:0.4; r:25 } 50% { opacity:0.8; r:32 } }
      @keyframes pulse2 { 0%,100% { opacity:0.4; r:25 } 50% { opacity:0.8; r:32 } }
      @keyframes pulse3 { 0%,100% { opacity:0.4; r:25 } 50% { opacity:0.8; r:32 } }
      @keyframes pulse4 { 0%,100% { opacity:0.4; r:25 } 50% { opacity:0.8; r:32 } }
      @keyframes pulse5 { 0%,100% { opacity:0.4; r:25 } 50% { opacity:0.8; r:32 } }
      @keyframes pulse6 { 0%,100% { opacity:0.4; r:25 } 50% { opacity:0.8; r:32 } }
      @keyframes pulse7 { 0%,100% { opacity:0.4; r:25 } 50% { opacity:0.8; r:32 } }
      @keyframes flowLine { 0% { stroke-dashoffset: 200 } 100% { stroke-dashoffset: 0 } }
      @keyframes nodeGlow { 0%,100% { filter: brightness(1) } 50% { filter: brightness(1.3) } }
      .node-rust { animation: pulse1 3s ease-in-out infinite; }
      .node-python { animation: pulse2 3.5s ease-in-out infinite 0.5s; }
      .node-solana { animation: pulse3 4s ease-in-out infinite 1s; }
      .node-tokio { animation: pulse4 2.8s ease-in-out infinite 0.3s; }
      .node-wgpu { animation: pulse5 3.2s ease-in-out infinite 0.8s; }
      .node-java { animation: pulse6 3.7s ease-in-out infinite 1.2s; }
      .node-spring { animation: pulse7 3.3s ease-in-out infinite 0.6s; }
      .connection { stroke-dasharray: 8 4; animation: flowLine 3s linear infinite; }
      .connection-reverse { stroke-dasharray: 8 4; animation: flowLine 3s linear infinite reverse; }
    </style>
  </defs>

  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <text x="400" y="40" text-anchor="middle" fill="#7B2FBE" font-family="monospace" font-size="14" font-weight="bold" letter-spacing="3">TECH STACK NEURAL MAP</text>

  <!-- Center: Rust -->
  <circle cx="400" cy="250" r="25" fill="none" stroke="#ff6b35" stroke-width="0.5" class="node-rust" opacity="0.3"/>
  <circle cx="400" cy="250" r="35" fill="url(#glowRust)"/>

  <!-- Python (top-left) -->
  <circle cx="220" cy="130" r="25" fill="none" stroke="#3776ab" stroke-width="0.5" class="node-python" opacity="0.3"/>
  <circle cx="220" cy="130" r="35" fill="url(#glowPython)"/>

  <!-- Solana (top-right) -->
  <circle cx="580" cy="130" r="25" fill="none" stroke="#9945ff" stroke-width="0.5" class="node-solana" opacity="0.3"/>
  <circle cx="580" cy="130" r="35" fill="url(#glowSolana)"/>

  <!-- Tokio (left) -->
  <circle cx="130" cy="330" r="25" fill="none" stroke="#ff4785" stroke-width="0.5" class="node-tokio" opacity="0.3"/>
  <circle cx="130" cy="330" r="35" fill="url(#glowTokio)"/>

  <!-- wgpu (right) -->
  <circle cx="670" cy="330" r="25" fill="none" stroke="#00bfff" stroke-width="0.5" class="node-wgpu" opacity="0.3"/>
  <circle cx="670" cy="330" r="35" fill="url(#glowWgpu)"/>

  <!-- Java (bottom-left) -->
  <circle cx="280" cy="420" r="25" fill="none" stroke="#ed8b00" stroke-width="0.5" class="node-java" opacity="0.3"/>
  <circle cx="280" cy="420" r="35" fill="url(#glowJava)"/>

  <!-- Spring (bottom-right) -->
  <circle cx="520" cy="420" r="25" fill="none" stroke="#6db33f" stroke-width="0.5" class="node-spring" opacity="0.3"/>
  <circle cx="520" cy="420" r="35" fill="url(#glowSpring)"/>

  <!-- Connections from Rust to all others -->
  <path d="M400,250 Q310,190 220,130" fill="none" stroke="#ff6b3560" stroke-width="1.5" class="connection"/>
  <path d="M400,250 Q490,190 580,130" fill="none" stroke="#ff6b3560" stroke-width="1.5" class="connection-reverse"/>
  <path d="M400,250 Q265,290 130,330" fill="none" stroke="#ff6b3560" stroke-width="1.5" class="connection"/>
  <path d="M400,250 Q535,290 670,330" fill="none" stroke="#ff6b3560" stroke-width="1.5" class="connection-reverse"/>
  <path d="M400,250 Q340,335 280,420" fill="none" stroke="#ff6b3560" stroke-width="1.5" class="connection"/>
  <path d="M400,250 Q460,335 520,420" fill="none" stroke="#ff6b3560" stroke-width="1.5" class="connection-reverse"/>

  <!-- Cross connections -->
  <path d="M220,130 Q400,100 580,130" fill="none" stroke="#9945ff40" stroke-width="1" class="connection"/>
  <path d="M130,330 Q200,375 280,420" fill="none" stroke="#00bfff40" stroke-width="1" class="connection-reverse"/>
  <path d="M670,330 Q600,375 520,420" fill="none" stroke="#ff478540" stroke-width="1" class="connection"/>
  <path d="M220,130 Q250,275 280,420" fill="none" stroke="#3776ab40" stroke-width="1" class="connection-reverse"/>
  <path d="M580,130 Q550,275 520,420" fill="none" stroke="#ed8b0040" stroke-width="1" class="connection"/>
  <path d="M130,330 Q175,230 220,130" fill="none" stroke="#00bfff40" stroke-width="1" class="connection"/>
  <path d="M670,330 Q625,230 580,130" fill="none" stroke="#9945ff40" stroke-width="1" class="connection-reverse"/>

  <!-- Node circles (solid) -->
  <g filter="url(#glow)">
    <circle cx="400" cy="250" r="22" fill="rgba(255,107,53,0.15)" stroke="#ff6b35" stroke-width="2"/>
    <circle cx="400" cy="250" r="8" fill="#ff6b35"/>
    <text x="400" y="288" text-anchor="middle" fill="#ff6b35" font-family="monospace" font-size="10" font-weight="bold">RUST</text>

    <circle cx="220" cy="130" r="20" fill="rgba(55,118,171,0.15)" stroke="#3776ab" stroke-width="2"/>
    <circle cx="220" cy="130" r="7" fill="#3776ab"/>
    <text x="220" y="166" text-anchor="middle" fill="#3776ab" font-family="monospace" font-size="10" font-weight="bold">PYTHON</text>

    <circle cx="580" cy="130" r="20" fill="rgba(153,69,255,0.15)" stroke="#9945ff" stroke-width="2"/>
    <circle cx="580" cy="130" r="7" fill="#9945ff"/>
    <text x="580" y="166" text-anchor="middle" fill="#9945ff" font-family="monospace" font-size="10" font-weight="bold">SOLANA</text>

    <circle cx="130" cy="330" r="18" fill="rgba(255,71,133,0.15)" stroke="#ff4785" stroke-width="2"/>
    <circle cx="130" cy="330" r="6" fill="#ff4785"/>
    <text x="130" y="364" text-anchor="middle" fill="#ff4785" font-family="monospace" font-size="10" font-weight="bold">TOKIO</text>

    <circle cx="670" cy="330" r="18" fill="rgba(0,191,255,0.15)" stroke="#00bfff" stroke-width="2"/>
    <circle cx="670" cy="330" r="6" fill="#00bfff"/>
    <text x="670" y="364" text-anchor="middle" fill="#00bfff" font-family="monospace" font-size="10" font-weight="bold">WGPU</text>

    <circle cx="280" cy="420" r="18" fill="rgba(237,139,0,0.15)" stroke="#ed8b00" stroke-width="2"/>
    <circle cx="280" cy="420" r="6" fill="#ed8b00"/>
    <text x="280" y="454" text-anchor="middle" fill="#ed8b00" font-family="monospace" font-size="10" font-weight="bold">JAVA</text>

    <circle cx="520" cy="420" r="18" fill="rgba(109,179,63,0.15)" stroke="#6db33f" stroke-width="2"/>
    <circle cx="520" cy="420" r="6" fill="#6db33f"/>
    <text x="520" y="454" text-anchor="middle" fill="#6db33f" font-family="monospace" font-size="10" font-weight="bold">SPRING</text>
  </g>
</svg>
